- id: m05-param-vs-statistic-01
  chapter: 5
  type: multiple-choice
  concepts: [parameter, statistic, estimator, estimate]
  difficulty: foundational
  prompt: "某社群有 8,000 名會員，其真實(但通常未知)的平均每週運動時數是 3.4 小時。研究者獨立隨機抽出 120 位會員，算得樣本平均數為 3.1 小時。下列哪個描述正確？"
  options:
    - id: a
      text: "3.1 小時是母體參數"
      correct: false
      misconception: "把由樣本算出的數值誤當成母體的固定特徵"
      feedback: "即使資料來自真實調查，3.1 小時仍會隨下次抽樣而改變，不具備參數的固定性質。"
    - id: b
      text: "3.1 小時是估計值，「取樣本平均」這個做法是估計量"
      correct: true
      feedback: "估計量是可重複套用的規則(取樣本平均)；套到這次樣本得到的具體數字 3.1 小時是估計值。"
    - id: c
      text: "3.1 小時是估計量，「取樣本平均」是估計值"
      correct: false
      misconception: "把「規則」與「規則套用後的結果」顛倒"
      feedback: "估計量是一般化的做法，估計值才是這次樣本產生的具體數字，兩者角色對調了。"
    - id: d
      text: "3.1 小時與 3.4 小時都是統計量"
      correct: false
      misconception: "未分辨會隨抽樣變動的量與母體固定但未知的量"
      feedback: "3.4 小時是母體平均數，屬於參數，不會因抽樣而改變；3.1 小時才是統計量算出的估計值。"
  answer: b
  solution: "「取樣本平均」是估計量；套用到這 120 人樣本後得到的 3.1 小時是估計值。3.4 小時是固定但未知的母體參數。"

- id: m05-se-vs-sd-01
  chapter: 5
  type: multiple-choice
  concepts: [standard-error, standard-deviation, sampling-distribution]
  difficulty: foundational
  prompt: "某公司有 500 名員工，年資的母體標準差是 6.0 年。人資部門獨立隨機抽取 n=100 人反覆計算樣本平均年資，得到的標準誤是 0.6 年。下列何者正確描述這兩個數字？"
  options:
    - id: a
      text: "6.0 年描述員工個別年資相對平均數的散布，0.6 年描述反覆抽樣下樣本平均年資的典型變動"
      correct: true
      feedback: "用樣本平均數的標準誤公式驗證：6.0/sqrt(100)=0.6 年，這是統計量在重複抽樣間的散布。"
    - id: b
      text: "兩者都描述員工個別年資的離散程度，只是單位換算不同"
      correct: false
      misconception: "把 SD 與 SE 當成同一個對象"
      feedback: "SD 描述個體資料相對平均數的散布；SE 描述統計量本身在不同樣本間的散布，層次不同。"
    - id: c
      text: "0.6 年是員工年資的標準差，6.0 年是平均數的標準誤"
      correct: false
      misconception: "把 SD 與 SE 的標籤對調"
      feedback: "6.0 年是母體個體資料的標準差，0.6 年才是樣本平均數這個統計量的標準誤。"
    - id: d
      text: "0.6 年會隨模擬重複次數增加而縮小，和樣本數大小無關"
      correct: false
      misconception: "把模擬重複次數 R 與樣本大小 n 混為一談"
      feedback: "真正決定 SE(x̄) 的是每次抽樣的人數 n；提高模擬重複次數只讓模擬直方圖更平滑，不改變 sigma/sqrt(n) 本身。"
  answer: a
  solution: "SE(x̄)=6.0/sqrt(100)=0.6 年，驗證了 6.0 年是個體層次的 SD、0.6 年是統計量層次的 SE。"

- id: m05-count-se-select-01
  chapter: 5
  type: multiple-choice
  concepts: [sum-of-indicators, standard-error, method-selection]
  difficulty: intermediate
  prompt: "某民調機構想知道：若對 300 位獨立隨機抽出的居民進行調查，「表態支持某議案的人數」(不是比例)會如何隨機波動。已知母體支持比例 p=0.55。應該用哪一種方法求這個「人數」的標準誤？"
  options:
    - id: a
      text: "直接用 SE(p̂)=sqrt(p(1-p)/n)，算出的就是人數的標準誤"
      correct: false
      misconception: "把比例的標準誤直接當成計數的標準誤，忽略單位差異"
      feedback: "SE(p̂) 是「比例」這個統計量的標準誤，單位是無量綱比例；人數的標準誤需要不同的尺度。"
    - id: b
      text: "把每人是否支持視為 0–1 指標變數，人數是這些指標的總和，因此用樣本總和的期望值與標準誤公式，取個體標準差 sigma=sqrt(p(1-p)) 求 SE(T)=sigma*sqrt(n)"
      correct: true
      feedback: "E(T)=300(0.55)=165 人，SE(T)=sqrt(0.55*0.45)*sqrt(300)≈8.62 人。"
    - id: c
      text: "用樣本平均數的標準誤公式 sigma/sqrt(n)，因為人數也是一種「平均」"
      correct: false
      misconception: "把總和誤當平均，方向弄反"
      feedback: "sigma/sqrt(n) 是平均數的標準誤，會隨 n 增大而縮小；人數的波動應隨 n 增大而放大，方向相反。"
    - id: d
      text: "因為居民總數遠大於樣本數，必須先套用有限母體修正，才能求人數的標準誤"
      correct: false
      misconception: "只因母體遠大於樣本就自動套用有限母體修正，未檢查是否為不放回抽樣與 10% 條件"
      feedback: "有限母體修正只在不放回抽樣且抽樣比例超過 10% 條件時才需要考慮，本題未說明抽樣方式，不能自動套用。"
  answer: b
  solution: "把支持與否編碼成指標變數後，人數是這些 0–1 變數的總和：E(T)=165 人，SE(T)=sqrt(0.55*0.45*300)≈8.62 人。"

- id: m05-mean-clt-battery-01
  chapter: 5
  type: calculation
  concepts: [sampling-distribution-of-mean, standard-error, central-limit-theorem]
  difficulty: intermediate
  prompt: "某型電池的母體平均壽命 mu=500 小時，母體標準差 sigma=40 小時。品管人員獨立隨機抽取 n=64 顆電池測試，求這組電池平均壽命低於 490 小時的機率。"
  answer: "約 0.0228(2.28%)"
  steps:
    - title: "辨識已知量"
      explanation: "mu=500、sigma=40、n=64，目標是 P(x̄<490)。"
    - title: "選擇方法"
      explanation: "先求樣本平均數的標準誤，再用中央極限定理做常態近似。"
      formula_ref: formula-m05-se-sample-mean
    - title: "檢查條件"
      explanation: "假設 64 顆電池為獨立隨機抽樣；n=64 不算小，若母體壽命分配不過度偏斜，CLT 近似合理。"
      formula_ref: formula-m05-central-limit-theorem
    - title: "代入計算"
      explanation: "SE(x̄)=40/sqrt(64)=5 小時；Z=(490-500)/5=-2。"
      formula_ref: formula-m05-mean-standardization
    - title: "查表"
      explanation: "P(Z<-2)≈0.0228。"
    - title: "解讀"
      explanation: "反覆抽取 64 顆電池，樣本平均壽命低於 490 小時的機率約 2.28%。"
    - title: "合理性檢查"
      explanation: "490 小時比母體平均少 10 小時，等於 2 個標準誤，落在常態尾端，機率小但非零，方向合理。"
  checks:
    - "SE 的單位是否與原資料(小時)相同？"
    - "是否說明近似仰賴獨立抽樣與母體不過度偏斜的假設？"

- id: m05-proportion-clt-defect-01
  chapter: 5
  type: calculation
  concepts: [sample-proportion, standard-error, normal-approximation-condition]
  difficulty: intermediate
  prompt: "某產線的母體不良率 p=0.10。品管人員獨立隨機抽取 n=400 件產品檢驗。求樣本不良比例 p̂ 的標準誤，並計算樣本不良比例超過 0.13 的機率。"
  answer: "SE(p̂)=0.015(1.5 個百分點)；P(p̂>0.13)≈0.0228"
  steps:
    - title: "辨識已知量"
      explanation: "p=0.10、n=400，目標是 SE(p̂) 與 P(p̂>0.13)。"
    - title: "選擇方法"
      explanation: "用樣本比例的期望值與標準誤公式，並檢查 np≥10、n(1-p)≥10 後套用常態近似。"
      formula_ref: formula-m05-sample-proportion-se
    - title: "檢查條件"
      explanation: "np=40≥10，n(1-p)=360≥10，兩者皆通過；假設 400 件檢驗彼此獨立、母體不良率固定。"
      formula_ref: formula-m05-proportion-normal-approximation
    - title: "代入計算"
      explanation: "SE(p̂)=sqrt(0.10*0.90/400)=sqrt(0.000225)=0.015；Z=(0.13-0.10)/0.015=2。"
    - title: "查表"
      explanation: "P(Z>2)≈0.0228。"
    - title: "解讀"
      explanation: "樣本不良比例的標準誤約 1.5 個百分點；反覆抽驗 400 件時，樣本不良比例高於 0.13 的機率約 2.28%。"
    - title: "合理性檢查"
      explanation: "SE(p̂) 為正且隨 n 增大會縮小；0.13 在 0 到 1 之間屬合理範圍，機率小但非零。"
  checks:
    - "是否先檢查 np 與 n(1-p) 都至少為 10？"
    - "SE 是否以百分點而非百分比報告？"

- id: m05-sum-clt-orders-01
  chapter: 5
  type: calculation
  concepts: [sample-sum, standard-error, central-limit-theorem]
  difficulty: intermediate
  prompt: "某網路商店每筆訂單金額的母體平均 mu=50 美元、母體標準差 sigma=20 美元。經理獨立隨機抽取 n=100 筆訂單，求這 100 筆訂單「總金額」低於 4,700 美元的機率。"
  answer: "約 0.0668(6.68%)"
  steps:
    - title: "辨識已知量"
      explanation: "mu=50、sigma=20、n=100，目標是總和 T 的 P(T<4700)。"
    - title: "選擇方法"
      explanation: "用樣本總和的期望值與標準誤公式求 E(T)、SE(T)，再把 CLT 的標準化概念類推到總和。"
      formula_ref: formula-m05-sum-mean-se
    - title: "檢查條件"
      explanation: "需要 100 筆訂單金額相互獨立、來自同一分配且變異數有限；若訂單間有關聯，sigma*sqrt(n) 可能低估不確定性。"
      formula_ref: formula-m05-central-limit-theorem
    - title: "代入計算"
      explanation: "E(T)=100(50)=5000 美元；SE(T)=20*sqrt(100)=200 美元；Z=(4700-5000)/200=-1.5。"
    - title: "查表"
      explanation: "P(Z<-1.5)≈0.0668。"
    - title: "解讀"
      explanation: "反覆抽取 100 筆獨立訂單，總金額低於 4,700 美元的機率約 6.68%。"
    - title: "合理性檢查"
      explanation: "4,700 美元比期望總額少 300 美元，等於 1.5 個標準誤，機率不算太小，方向合理。"
  checks:
    - "是否用總和公式(sigma*sqrt(n))而非平均數公式(sigma/sqrt(n))？"
    - "是否指出獨立性假設，以及相依資料會讓公式低估 SE？"

- id: m05-lln-misconception-01
  chapter: 5
  type: multiple-choice
  concepts: [law-of-large-numbers, gamblers-fallacy]
  difficulty: intermediate
  prompt: "一位分析師連續觀察某公正骰子出現「6」的比例，前 10 次的比例是 0.5。他說：「根據大數法則，接下來幾次一定會出現比較少的 6，把比例拉回 1/6。」這個說法錯誤，最準確的原因是？"
  options:
    - id: a
      text: "錯的原因是：只要之後把抽樣次數提高到超過某個門檻，大數法則就會保證接下來出現比較少的 6 來補償"
      correct: false
      misconception: "仍相信會有補償結果，只是誤以為存在能讓補償變成保證的樣本數門檻"
      feedback: "大數法則從未保證接下來幾次的結果，不論抽樣次數多寡；連續 5 次正面後，下一次仍是 1/2。"
    - id: b
      text: "大數法則只保證當抽樣次數持續增加時，累積比例會趨近 1/6，不保證接下來幾次會發生什麼補償性的結果"
      correct: true
      feedback: "大數法則談的是長期比例的收斂，不是短期一定會出現補償。"
    - id: c
      text: "大數法則保證出現 6 的次數與理論次數(次數乘以 1/6)之間的差距，會隨抽樣次數增加而縮小"
      correct: false
      misconception: "把相對誤差縮小誤記成絕對誤差縮小"
      feedback: "總和的標準誤是 sigma*sqrt(n)，出現 6 的次數與理論次數的絕對差距通常隨 n 增大而變大；縮小的是相對於總次數的比例誤差。"
    - id: d
      text: "只要長期觀察次數夠多，大數法則就能讓我們排除骰子本身不公正的可能"
      correct: false
      misconception: "以為大數法則能診斷或修正偏誤"
      feedback: "大數法則假設機制本身已固定；如果骰子真的有偏，大量重複只會更精確地逼近那個有偏的機率，不會自動偵測或修復它。"
  answer: b
  solution: "大數法則描述長期比例會收斂到 1/6，不代表短期內會出現補償性的結果來抵銷先前的偏離。"

- id: m05-fpc-overtime-01
  chapter: 5
  type: calculation
  concepts: [finite-population-correction, sampling-without-replacement]
  difficulty: advanced
  prompt: "某公司共有 N=250 位員工，母體加班時數的標準差 sigma=9 小時。人資部門以不放回方式，隨機抽取 n=50 位員工調查加班時數。求樣本平均加班時數的標準誤。"
  answer: "約 1.14 小時"
  steps:
    - title: "辨識已知量"
      explanation: "N=250、n=50、sigma=9 小時，抽樣方式為不放回。"
    - title: "選擇方法"
      explanation: "先算視為獨立時的 sigma/sqrt(n)，再檢查 10% 條件決定是否需要有限母體修正。"
      formula_ref: formula-m05-se-sample-mean
    - title: "檢查條件"
      explanation: "抽樣比例 n/N=50/250=0.20，超過 10% 條件，因此不能忽略 FPC，需要修正。"
      formula_ref: formula-m05-finite-population-correction
    - title: "代入計算"
      explanation: "sigma/sqrt(n)=9/sqrt(50)≈1.2728；FPC=sqrt((250-50)/(250-1))=sqrt(200/249)≈0.8962；修正後 SE≈1.2728*0.8962≈1.14 小時。"
    - title: "解讀"
      explanation: "若忽略 FPC，會把標準誤高估為約 1.27 小時；考慮不放回抽樣的修正後，標準誤約為 1.14 小時。"
    - title: "合理性檢查"
      explanation: "FPC≈0.896 介於 0 與 1 之間，使修正後的 SE 比獨立假設下小，方向正確；且 1≤n≤N 成立，公式可用。"
  checks:
    - "抽樣比例 n/N 是否超過 10%，因而需要 FPC？"
    - "修正後的 SE 是否小於未修正的 sigma/sqrt(n)？"
